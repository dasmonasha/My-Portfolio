<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D.A.S. Monasha - Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0c0d10;
            --card-bg-dark: #16171b;
            --accent-yellow: #f1f618;
            --text-white: #e8e9eb;
            --text-gray: #a1a3a6;
            --text-black: #111111;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            padding: 20px;
        }

        /* Header */
        .header {
            background-color: transparent;
            padding: 20px 40px;
            margin-bottom: 20px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-white);
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--accent-yellow);
        }

        .nav ul {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        .nav a {
            text-decoration: none;
            color: var(--text-white);
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: var(--accent-yellow);
        }

        .menu-burger {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        /* Hero Banner */
        .hero-banner {
            background-color: #000000;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 60px;
            border: 1px solid #222;
        }

        .hero-banner-container {
            display: flex;
            align-items: center;
            height: 440px;
        }

        .hero-image-side {
            width: 35%;
            height: 100%;
            background: #111;
        }

        .developer-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-text-side {
            width: 65%;
            padding: 60px;
            text-align: center;
            position: relative;
        }

        .crafted-title {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .crafted-subtitle {
            font-size: 1.3rem;
            color: var(--accent-yellow);
            letter-spacing: 1px;
        }

        /* Global Sections Layout */
        section {
            max-width: 1400px;
            margin: 0 auto 60px auto;
            padding: 20px;
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: #ffffff;
            border-left: 5px solid var(--accent-yellow);
            padding-left: 15px;
            text-transform: uppercase;
        }

        /* About Section */
        .about-container {
            background-color: var(--card-bg-dark);
            padding: 40px;
            border-radius: 20px;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-gray);
            border: 1px solid #222;
        }

        .about-container strong {
            color: #ffffff;
            border-bottom: 2px solid var(--accent-yellow);
        }

        /* Interactive Grid Layout (Touch/Hover Cards) */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .case-card {
            background-color: var(--card-bg-dark);
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 450px;
            border: 1px solid #222;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* ටච් කරද්දී හෝ මවුස් එක ගෙනිච්චම වෙනස් වෙන හැටි */
        .case-card:hover, .case-card:active {
            transform: translateY(-8px);
            border-color: var(--accent-yellow);
            box-shadow: 0 10px 20px rgba(241, 246, 24, 0.1);
        }

        .case-card h3 {
            font-size: 1.7rem;
            margin-bottom: 25px;
            color: #ffffff;
        }

        .case-details {
            list-style: none;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .case-details li {
            font-size: 1rem;
            line-height: 1.6;
            position: relative;
            padding-left: 25px;
            color: var(--text-gray);
        }

        .case-details li::before {
            content: "●";
            position: absolute;
            left: 0;
            color: var(--accent-yellow);
        }

        /* කහ පාටින් කැපිලා පේන කාඩ් එක */
        .card-yellow {
            background-color: var(--accent-yellow);
            color: var(--text-black);
            border: none;
        }

        .card-yellow h3 {
            color: var(--text-black);
            font-weight: 800;
        }

        .card-yellow .case-details li {
            color: var(--text-black);
            font-weight: 500;
        }

        .card-yellow .case-details li::before {
            color: #000000;
        }

        /* Media Container (ෆොටෝ, වීඩියෝ දාන්න පුළුවන් තැන්) */
        .media-box {
            width: 100%;
            height: 200px;
            background: #090a0c;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #444;
        }

        .media-box img, .media-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-placeholder {
            color: #555;
            font-size: 0.9rem;
            text-align: center;
        }

        .media-placeholder i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
            color: #333;
        }

        /* Tech Tags */
        .tech-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag {
            background: #0c0d10;
            color: var(--accent-yellow);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid #222;
        }

        .card-yellow .tag {
            background: #000000;
            color: #ffffff;
        }

        /* Skills Section */
        .skills-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .skills-category {
            background-color: var(--card-bg-dark);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid #222;
            transition: all 0.3s ease;
        }

        .skills-category:hover {
            border-color: var(--accent-yellow);
        }

        .skills-category h3 {
            color: var(--accent-yellow);
            margin-bottom: 25px;
            font-size: 1.3rem;
            text-transform: uppercase;
        }

        .skills-category ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .skills-category li {
            font-size: 1.05rem;
            color: var(--text-gray);
        }

        .skills-category i {
            color: var(--accent-yellow);
            margin-right: 12px;
            width: 20px;
        }

        /* Contact Section */
        .contact-section {
            text-align: center;
            background-color: var(--card-bg-dark);
            padding: 60px;
            border-radius: 20px;
            border: 1px solid #222;
        }

        .contact-section p {
            color: var(--text-gray);
            margin-bottom: 35px;
            font-size: 1.1rem;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 40px;
            font-size: 1.25rem;
            flex-wrap: wrap;
        }

        .contact-info i {
            color: var(--accent-yellow);
            margin-right: 12px;
        }

        .social-links a {
            font-size: 2.8rem;
            color: var(--text-white);
            margin: 0 20px;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            color: var(--accent-yellow);
            transform: scale(1.1);
        }

            text-align: center;
            padding: 40px;
            color: #4
